services:
  - type: web
    name: tcg-arbitrage
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --daemon --host 0.0.0.0 --port $PORT --cards 50 --platforms pricecharting tcgplayer
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
